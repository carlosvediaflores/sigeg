<div class="drawer" [class.drawer-open]="sidebarOpen()">

    <!-- CONTROL -->
    <input id="sidebar" type="checkbox" class="drawer-toggle" [checked]="sidebarOpen()" />

    <!-- PAGE -->
    <div class="drawer-content flex flex-col bg-base-200 transition-all duration-300">

        <!-- NAVBAR -->
        <div class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-50">

            <!-- LEFT -->
            <div class="flex-none">

                <button class="btn btn-square btn-ghost" (click)="toggleSidebar()">

                    <!-- HAMBURGER -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        class="w-6 h-6 stroke-current">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />

                    </svg>

                </button>

            </div>

            <!-- TITLE -->
            <div class="flex-1">
                <a class="font-montserrat text-3xl font-bold">
                    Admin Dashboard
                </a>
            </div>

            <!-- RIGHT -->
            <div class="flex gap-2">

                <!-- SEARCH -->
                <div class="hidden md:block">
                    <input type="text" placeholder="Buscar..." class="input input-bordered w-64" />
                </div>

                <!-- NOTIFICATIONS -->
                <button class="btn btn-ghost btn-circle">

                    <div class="indicator">

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11
                   a6.002 6.002 0 00-4-5.659V5
                   a2 2 0 10-4 0v.341C7.67 6.165
                   6 8.388 6 11v3.159c0 .538-.214
                   1.055-.595 1.436L4 17h5m6 0v1
                   a3 3 0 11-6 0v-1m6 0H9" />

                        </svg>

                        <span class="badge badge-xs badge-primary indicator-item"></span>

                    </div>

                </button>

                <!-- USER -->
                <div class="dropdown dropdown-end">

                    <div tabindex="0" role="button" class="btn btn-ghost">

                        <div class="avatar">
                            <div class="w-10 rounded-full">
                                <img src="https://i.pravatar.cc/100" />
                            </div>
                        </div>

                    </div>

                    <ul tabindex="0" class="menu dropdown-content bg-base-100 rounded-box z-50 mt-3 w-52 p-2 shadow">

                        <li>
                            <a>Perfil</a>
                        </li>

                        <li>
                            <a>Configuración</a>
                        </li>

                        <li>
                            <a>Cerrar sesión</a>
                        </li>

                    </ul>

                </div>

            </div>

        </div>

        <!-- CONTENT -->
        <main class="p-6 overflow-y-auto h-[calc(100vh-64px)]">

            <!-- CARDS -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-6">

                <div class="card bg-base-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title">Ventas</h2>
                        <p class="text-3xl font-bold">$12,450</p>
                    </div>
                </div>

                <div class="card bg-base-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title">Usuarios</h2>
                        <p class="text-3xl font-bold">1,240</p>
                    </div>
                </div>

                <div class="card bg-base-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title">Pedidos</h2>
                        <p class="text-3xl font-bold">320</p>
                    </div>
                </div>

                <div class="card bg-base-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title">Ganancias</h2>
                        <p class="text-3xl font-bold">$8,900</p>
                    </div>
                </div>

            </div>

            <!-- ROUTER -->
            <router-outlet />

        </main>

    </div>

    <!-- SIDEBAR -->
    <div class="drawer-side z-50">

        <!-- OVERLAY -->
        <label class="drawer-overlay" (click)="closeSidebar()">
        </label>

        <!-- SIDEBAR -->
        <aside  class="w-72 min-h-full bg-base-100 border-r border-base-300 transition-all duration-300">

            <!-- LOGO -->
            <div class="h-16 flex items-center px-6 border-b border-base-300">

                <h1 class="text-2xl font-black">
                    DASH<span class="text-primary">PRO</span>
                </h1>

            </div>

            <!-- PROFILE -->
            <div class="p-6 border-b border-base-300">

                <div class="flex items-center gap-4">

                    <div class="avatar">
                        <div class="w-14 rounded-full">
                            <img src="https://i.pravatar.cc/100" />
                        </div>
                    </div>

                    <div>
                        <h2 class="font-bold">
                            Carlos Vedia
                        </h2>

                        <p class="text-sm opacity-60">
                            Administrator
                        </p>
                    </div>

                </div>

            </div>

            <!-- MENU -->
            <ul class="menu p-4 w-full text-base-content">

                <li class="menu-title">
                    <span>GENERAL</span>
                </li>

                <li>
                    <a routerLink="/" routerLinkActive="active">

                        Dashboard

                    </a>
                </li>

                <li>
                    <a routerLink="/users" routerLinkActive="active">

                        Usuarios

                    </a>
                </li>

                <li>
                    <details open>

                        <summary>
                            Administración
                        </summary>

                        <ul>

                            <li>
                                <a>
                                    Roles
                                </a>
                            </li>

                            <li>
                                <a>
                                    Permisos
                                </a>
                            </li>

                        </ul>

                    </details>
                </li>

                <li class="menu-title mt-4">
                    <span>SISTEMA</span>
                </li>

                <li>
                    <a routerLink="/settings" routerLinkActive="active">

                        Configuración

                    </a>
                </li>

            </ul>

        </aside>

    </div>

</div>
