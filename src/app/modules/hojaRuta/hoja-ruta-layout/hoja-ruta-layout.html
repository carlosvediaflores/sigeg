<div class="drawer" [class.drawer-open]="sidebarOpen()">

    <!-- CONTROL -->
    <input id="sidebar" type="checkbox" class="drawer-toggle" [checked]="sidebarOpen()" />

    <!-- PAGE -->
    <div class="drawer-content flex flex-col bg-base-200 transition-all duration-300">

        <!-- NAVBAR -->
        <div class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-50">

            <!-- LEFT -->
            <div class="flex-none">

                <button class="btn btn-square btn-ghost" (click)="toggleSidebar()">

                    <!-- HAMBURGER -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        class="w-6 h-6 stroke-current">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />

                    </svg>

                </button>

            </div>

            <!-- TITLE -->
            <div class="flex-1">
                <a class="font-montserrat text-3xl font-bold">
                    Control y Seguimiento de Hoja de Ruta
                </a>
            </div>

            <!-- RIGHT -->
            <div class="flex gap-2">

                <!-- SEARCH -->
                <div class="hidden md:block">
                    <input type="text" placeholder="Buscar..." class="input input-bordered w-64" />
                </div>

                <!-- IR A INICIO -->
                <button routerLink="/main" class="btn btn-ghost btn-circle">

                    <div class="indicator">

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                            <path
                                d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z" />
                            <path
                                d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z" />
                        </svg>
                        <span class="badge badge-xs badge-error indicator-item"></span>

                    </div>

                </button>

                <!-- NOTIFICATIONS -->

                <!-- USER -->
                <div class="dropdown dropdown-end">

                    <div tabindex="0" role="button" class="btn btn-ghost">

                        <div class="avatar">
                            <div class="w-10 rounded-full">
                                <img src="https://i.pravatar.cc/100" />
                            </div>
                        </div>

                    </div>

                    <ul tabindex="0" class="menu dropdown-content bg-base-100 rounded-box z-50 mt-3 w-52 p-2 shadow">

                        <li>
                            <a>Perfil</a>
                        </li>

                        <li>
                            <a>Configuración</a>
                        </li>

                        <li>
                            <a>Cerrar sesión</a>
                        </li>

                    </ul>

                </div>

            </div>

        </div>

        

        <!-- CONTENT -->
        <main class="p-3 overflow-y-auto h-[calc(100vh-64px)]">

           

            <!-- ROUTER -->
            <router-outlet />

        </main>

    </div>

    <!-- SIDEBAR -->
    <div class="drawer-side z-50">

        <!-- OVERLAY -->
        <label class="drawer-overlay" (click)="closeSidebar()">
        </label>

        <!-- SIDEBAR -->
        <aside  class="w-72 min-h-full bg-base-100 border-r border-base-300 transition-all duration-300">

           <!-- LOGO -->
            <app-logo-nombre />
            

            <!-- PROFILE -->
             <app-profile />

            <!-- MENU -->
            <ul class="menu p-4 w-full text-base-content">

                <li class="menu-title">
                    <span>GENERAL</span>
                </li>

                <li>
                    <a routerLink="/" routerLinkActive="active">

                        Dashboard

                    </a>
                </li>

                <li>

                    </a>
                </li>

                <li>
                    <a routerLink="/hojaRuta/oficina" routerLinkActive="active">

                    </a>
                </li>
